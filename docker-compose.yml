
services:

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: ems-db
    environment:
      POSTGRES_DB: enterprise_scheduling_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  # Node.js backend API
  backend:
    build: ./backend
    container_name: ems-backend
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
    ports:
      - "5000:5000"

  # React frontend
  frontend:
    build: ./frontend
    container_name: ems-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: